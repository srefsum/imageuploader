<h2 class="page-title">Upload Music or Images</h2>
<p class="breadcrumb"><a href="/index">Home</a> / <a href="/music">Music Library</a> / <span>Upload</span></p>

<div class="card">
    <form id="music-upload-form" action="/music/upload" method="post" enctype="multipart/form-data">
        <input type="hidden" name="path" value="
#replace "upload_path"
        " />

        <div class="form-group">
            <label class="form-label">Destination folder</label>
            <p class="form-hint">
#replace "upload_path_display"
            </p>
        </div>

        <div class="form-group">
            <label class="form-label" for="music-filename">Select file</label>
            <input class="form-input" type="file" name="filename" id="music-filename" accept="
#replace "accept_extensions"
            " />
            <p class="form-hint">Audio and image files (e.g. folder.jpg). Allowed:
#replace "extensions_text"
             &middot; Max
#replace "max_upload_mb"
             MB</p>
        </div>

        <button type="submit" class="btn btn-primary">Upload file</button>
    </form>
</div>
