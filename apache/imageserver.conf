<VirtualHost *:80>
    ServerName imageserver.local
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/image-server/public

    # Define the directory for your Perl CGI script
    ScriptAlias /cgi-bin/ /var/www/image-server/cgi-bin/

    AcceptPathInfo On

    <Directory "/var/www/image-server/cgi-bin">
        AllowOverride None
        Options +ExecCGI
        AddHandler cgi-script .pl
        Require all granted
    </Directory>

    # Optional URL Rewriting so users don't have to type /cgi-bin/serve_image.pl?file=img.jpg
    RewriteEngine On

    # If someone requests an actual static file in the public folder, serve it directly
    # RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME} !-f
    # Otherwise, pass everything else to the Perl image router
    # RewriteRule ^/(.*)$ /cgi-bin/serve_image.pl?file=$1 [L,PT,QSA]
    # RewriteRule ^/(.*)$ /cgi-bin/serve_image.pl [L,PT,QSA]
    RewriteRule ^/(.*)$ /cgi-bin/app [L,PT,QSA]

    ErrorLog ${APACHE_LOG_DIR}/image_server_error.log
    CustomLog ${APACHE_LOG_DIR}/image_server_access.log combined
</VirtualHost>