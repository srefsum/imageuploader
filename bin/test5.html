<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Directory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
        }
        .form-container {
            max-width: 400px;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Create Directory</h2>
        <form action="/upload" method="post" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="current_dir">Current Directory:</label>
                <input type="text" id="current_dir" name="current_dir" placeholder="/var/www/html" required>
            </div>

            <div class="form-group">
                <label for="new_dir">New Directory Name:</label>
                <input type="text" id="new_dir" name="new_dir" placeholder="my_new_folder" required>
            </div>

            <button type="submit">Create</button>
        </form>
    </div>

</body>
</html>
